# .github/workflows/test.yml
name: tests

on:
  push:
  pull_request:

jobs:
  bats:
    runs-on: ubuntu-latest
    env:
      SKIP_ROOT_CHECK: "1"
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Ensure executable bits
        run: chmod +x bin/usb-wakeup-blocker.sh test/run-tests.sh

      - name: Init submodules (recursive)
        run: git submodule update --init --recursive

      - name: Install kcov build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libelf-dev libdw-dev libcurl4-openssl-dev zlib1g-dev

      - name: Build and install kcov
        run: |
          git clone https://github.com/SimonKagstrom/kcov.git
          cd kcov
          mkdir build
          cd build
          cmake ..
          make
          sudo make install

      - name: Run Bats tests with kcov
        run: kcov --include-path=bin/usb-wakeup-blocker.sh --exclude-pattern=test/ --exclude-pattern=/usr/share/kcov/ test_coverage_output ./test/run-tests.sh > test_output.log 2>&1
        continue-on-error: true

      - name: Upload kcov coverage report
        uses: actions/upload-artifact@v4
        with:
          name: kcov-report
          path: test_coverage_output

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test_coverage_output/cobertura.xml # kcov generates cobertura.xml by default
          fail_ci_if_error: true # Optional: Don't fail CI if Codecov upload fails
          verbose: true # Optional: Enable verbose logging for debug

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test_output.log

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -name "*.sh" -print0 | xargs -0 shellcheck

  install-uninstall:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test install/uninstall in systemd container
        shell: bash
        run: |
          set -euo pipefail

          container_id=$(docker run --detach --rm \
            --privileged \
            --cgroupns=host \
            --tmpfs /run --tmpfs /tmp \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "$PWD":/src \
            -w /src \
            jrei/systemd-ubuntu:24.04 \
            /sbin/init)

          cleanup() {
            docker stop "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker exec --workdir /src "$container_id" bash -lc '
            set -euo pipefail

            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y sudo bash-completion usbutils

            chmod +x install.sh uninstall.sh

            sudo ./install.sh

            test -x /usr/bin/usb-wakeup-blocker.sh
            test -f /usr/lib/systemd/system/usb-wakeup-blocker.service
            test -f /usr/share/bash-completion/completions/usb-wakeup-blocker
            test -f /usr/share/zsh/site-functions/_usb-wakeup-blocker
            test -f /etc/usb-wakeup-blocker.conf
            systemctl cat usb-wakeup-blocker.service >/dev/null

            sudo ./uninstall.sh

            test ! -e /usr/bin/usb-wakeup-blocker.sh
            test ! -e /usr/lib/systemd/system/usb-wakeup-blocker.service
            test ! -e /usr/share/bash-completion/completions/usb-wakeup-blocker
            test ! -e /usr/share/zsh/site-functions/_usb-wakeup-blocker
            test ! -e /etc/usb-wakeup-blocker.conf
            if systemctl cat usb-wakeup-blocker.service >/dev/null 2>&1; then
              echo "Service still present after uninstall" >&2
              exit 1
            fi
          '
